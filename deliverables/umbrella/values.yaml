# =============================================================================
# Camunda 8.9 Self-Managed + HashiCorp Vault — Umbrella values (OpenShift / ROKS)
# -----------------------------------------------------------------------------
# Design (per Msg 309 corrections):
#   * PER-APP isolation. Each Camunda app that consumes a Vault-sourced secret
#     gets its OWN ServiceAccount, its OWN Vault role/policy, its OWN Kubernetes
#     Secret, and a watch sidecar that rollout-restarts ONLY that one workload.
#   * No self-signed `gencert`. TLS trust comes from the OpenShift service-ca
#     bundle, surfaced via the `trusted-ca` ConfigMap
#     (key service-ca.crt -> mounted as tls-ca-bundle.pem).
#   * HAProxy TLS uses an OpenShift service-serving-cert (no self-signed).
#   * Deployed via ArgoCD: render with `helm template` in GitLab CI (see
#     ../.gitlab-ci.yml). NO Helm post-render / kustomize step is required,
#     because per-app rollout restarts remove the need for shareProcessNamespace.
#
# Conventions (change in lock-step if customised):
#   * Release name : camunda      Namespace : camunda
#   * Service names then become camunda-elasticsearch, camunda-zeebe-gateway, ...
#
# NOTE: the sidecar/init `image:` in the camunda-platform section below is a
# LITERAL (Helm does not template values passed to subcharts). Keep it in sync
# with vaultAgent.image.
# =============================================================================

# -----------------------------------------------------------------------------
# Settings consumed by THIS umbrella chart's own templates
# (per-app ServiceAccounts/RBAC, ConfigMaps, trusted-ca, Vault bootstrap Job).
# -----------------------------------------------------------------------------
vaultAgent:
  # Build from ./vault-sidecar and push to your air-gapped registry.
  image: icr.io/camunda-airgap/camunda-vault-agent:1.0.0
  imagePullPolicy: IfNotPresent

  intervalSeconds: 300            # how often each watch sidecar re-checks Vault

  vault:
    addr: "https://vault.vault.svc.cluster.local:8200"
    authPath: kubernetes          # Vault Kubernetes auth mount path
    namespace: ""                 # Vault Enterprise namespace (optional)
    # TLS to Vault is verified using the trusted-ca bundle below (OpenShift
    # service-ca). Set skipVerify only for throwaway testing.
    skipVerify: false

  # OpenShift service-ca trust bundle. The `trusted-ca` ConfigMap is created
  # empty with the inject annotation; OpenShift populates service-ca.crt. It is
  # mounted into every agent container (and the app containers) so the JVM and
  # curl trust in-cluster service-serving certificates (Vault, Elasticsearch,
  # Keycloak, ...). On vanilla Kubernetes set openshiftInject=false and paste
  # your own PEM bundle into caBundle.
  trustedCa:
    enabled: true
    configMapName: trusted-ca
    openshiftInject: true
    caBundle: ""                  # used only when openshiftInject=false

  # The bootstrap Job seeds ALL secrets below (so datastores can boot) using a
  # dedicated SA + a broad-read Vault role. It performs NO restarts.
  bootstrap:
    serviceAccountName: camunda-vault-bootstrap
    vaultRole: camunda-bootstrap

  rbac:
    create: true                  # create per-app Roles/RoleBindings

  # NetworkPolicy locks the bootstrap Job pod's egress down to DNS + Vault + the
  # Kubernetes API server. See docs/ARCHITECTURE.md for per-module alternatives.
  networkPolicy:
    enabled: true
    vaultPort: 8200
    apiServerPort: 443
    vaultCidr: ""

  # ---------------------------------------------------------------------------
  # Secret targets. KV v2 read paths (note the `/data/` segment) -> per-app
  # Kubernetes Secret. Targets WITH a `sidecar:` block also get a dedicated SA,
  # Vault role and a watch sidecar that rollout-restarts only `workload`.
  # Targets WITHOUT a sidecar are datastore secrets: created once by the
  # bootstrap Job (rotation is a documented runbook, not a live restart).
  # ---------------------------------------------------------------------------
  targets:
    # ---- datastore secrets (bootstrap-only, no sidecar) ----
    - name: elasticsearch
      secretName: camunda-elasticsearch-secret
      mappings:
        - { vaultPath: secret/data/camunda/elasticsearch, field: password, secretKey: elasticsearch-password }

    - name: keycloak
      secretName: camunda-keycloak-secret
      mappings:
        - { vaultPath: secret/data/camunda/keycloak, field: admin-password, secretKey: admin-password }

    - name: keycloak-db
      secretName: camunda-keycloak-db-secret
      mappings:
        - { vaultPath: secret/data/camunda/postgres/keycloak, field: admin-password, secretKey: admin-password }
        - { vaultPath: secret/data/camunda/postgres/keycloak, field: user-password,  secretKey: user-password }

    # ---- web-modeler: its restapi pod consumes this secret at runtime, so it
    #      gets a sidecar + per-app SA that restarts only the restapi Deployment.
    - name: web-modeler
      secretName: camunda-web-modeler-db-secret
      mappings:
        - { vaultPath: secret/data/camunda/postgres/webmodeler, field: admin-password, secretKey: admin-password }
        - { vaultPath: secret/data/camunda/postgres/webmodeler, field: user-password,  secretKey: user-password }
      sidecar:
        serviceAccountName: camunda-vault-web-modeler
        vaultRole: camunda-web-modeler
        workload: { kind: Deployment, name: camunda-web-modeler-restapi }

    # ---- orchestration (Zeebe + Operate + Tasklist): reads the ES password ----
    - name: orchestration
      secretName: camunda-orchestration-secret
      mappings:
        - { vaultPath: secret/data/camunda/elasticsearch, field: password, secretKey: elasticsearch-password }
      sidecar:
        serviceAccountName: camunda-vault-orchestration
        vaultRole: camunda-orchestration
        workload: { kind: StatefulSet, name: camunda-zeebe }

    # ---- optimize: reads the ES password ----
    - name: optimize
      secretName: camunda-optimize-secret
      mappings:
        - { vaultPath: secret/data/camunda/elasticsearch, field: password, secretKey: elasticsearch-password }
      sidecar:
        serviceAccountName: camunda-vault-optimize
        vaultRole: camunda-optimize
        workload: { kind: Deployment, name: camunda-optimize }

# -----------------------------------------------------------------------------
# HAProxy — single external entry point. All external traffic enters here and is
# routed to the internal Camunda module ClusterIP services by path prefix.
# -----------------------------------------------------------------------------
haproxy:
  enabled: true
  host: "camunda.example.com"           # keep identical to camunda-platform.global.host
  image: haproxytech/haproxy-alpine:3.0
  replicas: 2
  service:
    type: LoadBalancer        # LoadBalancer (IKS) | ClusterIP (+ OpenShift Route)
    httpPort: 80
    httpsPort: 443
    grpcPort: 26500
    annotations: {}
  # TLS termination at HAProxy using an OpenShift service-serving-cert.
  tls:
    enabled: true
    redirectHttp: true        # 301 redirect http -> https
    # OpenShift mints a kubernetes.io/tls secret for the HAProxy Service when
    # openshiftServiceCA=true (via the serving-cert-secret-name annotation).
    # On vanilla Kubernetes, set openshiftServiceCA=false and provide your own
    # kubernetes.io/tls secret name in `secretName`.
    openshiftServiceCA: true
    secretName: camunda-haproxy-tls
  resources:
    requests: { cpu: "100m", memory: "128Mi" }
    limits: { cpu: "500m", memory: "256Mi" }

# =============================================================================
# Camunda Platform subchart values
# =============================================================================
camunda-platform:

  global:
    host: "camunda.example.com"   # keep identical to haproxy.host
    security:
      authentication:
        method: oidc
    identity:
      auth:
        enabled: true
        publicIssuerUrl: "https://camunda.example.com/auth/realms/camunda-platform"
        optimize:
          redirectUrl: "https://camunda.example.com/optimize"
        webModeler:
          redirectUrl: "https://camunda.example.com/modeler"
        console:
          redirectUrl: "https://camunda.example.com/console"

  # ---------------------------------------------------------------------------
  # Management Identity — uses Keycloak via OIDC, no Vault-sourced runtime
  # secret, so NO sidecar/SA is attached (least privilege).
  # ---------------------------------------------------------------------------
  identity:
    enabled: true
    contextPath: "/identity"
    fullURL: "https://camunda.example.com/identity"
    extraVolumes:
      - name: trusted-ca
        configMap:
          name: trusted-ca
          optional: true
          items:
            - { key: service-ca.crt, path: tls-ca-bundle.pem }
    extraVolumeMounts:
      - { name: trusted-ca, mountPath: /etc/pki/ca-trust/extracted/pem, readOnly: true }

  # ---------------------------------------------------------------------------
  # Internal Keycloak (+ its embedded PostgreSQL). Secrets seeded by bootstrap.
  # ---------------------------------------------------------------------------
  identityKeycloak:
    enabled: true
    auth:
      adminUser: admin
      existingSecret: camunda-keycloak-secret
      passwordSecretKey: admin-password
    postgresql:
      auth:
        existingSecret: camunda-keycloak-db-secret
        secretKeys:
          adminPasswordKey: admin-password
          userPasswordKey: user-password

  identityPostgresql:
    enabled: false

  # ---------------------------------------------------------------------------
  # Orchestration cluster (Zeebe broker/gateway + Operate + Tasklist).
  # Per-app SA + sidecar; ES password from its own secret.
  # Rendered workload: StatefulSet camunda-zeebe.
  # ---------------------------------------------------------------------------
  orchestration:
    enabled: true
    serviceAccount:
      enabled: false
      name: camunda-vault-orchestration
    replicas: 1
    clusterSize: "1"
    partitionCount: "1"
    replicationFactor: "1"
    pvcSize: 10Gi
    data:
      secondaryStorage:
        type: elasticsearch
        elasticsearch:
          url: http://camunda-elasticsearch:9200
          auth:
            username: elastic
            secret:
              existingSecret: camunda-orchestration-secret
              existingSecretKey: elasticsearch-password
    initContainers:
      - name: vault-fetch
        image: icr.io/camunda-airgap/camunda-vault-agent:1.0.0
        imagePullPolicy: IfNotPresent
        args: ["fetch"]
        envFrom: [{ configMapRef: { name: camunda-vault-agent-env } }]
        env:
          - { name: POD_NAMESPACE, valueFrom: { fieldRef: { fieldPath: metadata.namespace } } }
        volumeMounts:
          - { name: vault-agent-config, mountPath: /etc/camunda-vault-agent, readOnly: true }
          - { name: vault-tmp, mountPath: /tmp }
          - { name: trusted-ca, mountPath: /etc/pki/ca-trust/extracted/pem, readOnly: true }
        securityContext: &agentSecCtx
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1001
          capabilities: { drop: ["ALL"] }
          seccompProfile: { type: RuntimeDefault }
    sidecars:
      - name: vault-agent
        image: icr.io/camunda-airgap/camunda-vault-agent:1.0.0
        imagePullPolicy: IfNotPresent
        args: ["watch"]
        envFrom: [{ configMapRef: { name: camunda-vault-agent-env } }]
        env:
          - { name: POD_NAMESPACE, valueFrom: { fieldRef: { fieldPath: metadata.namespace } } }
          - { name: RESTART_TARGET_KIND, value: StatefulSet }
          - { name: RESTART_TARGET_NAME, value: camunda-zeebe }
        volumeMounts:
          - { name: vault-agent-config, mountPath: /etc/camunda-vault-agent, readOnly: true }
          - { name: vault-tmp, mountPath: /tmp }
          - { name: trusted-ca, mountPath: /etc/pki/ca-trust/extracted/pem, readOnly: true }
        resources:
          requests: { cpu: "10m", memory: "32Mi" }
          limits: { cpu: "100m", memory: "64Mi" }
        securityContext: *agentSecCtx
    extraVolumes:
      - { name: vault-agent-config, configMap: { name: camunda-vault-orchestration-config } }
      - { name: vault-tmp, emptyDir: {} }
      - name: trusted-ca
        configMap:
          name: trusted-ca
          optional: true
          items:
            - { key: service-ca.crt, path: tls-ca-bundle.pem }
    extraVolumeMounts:
      - { name: trusted-ca, mountPath: /etc/pki/ca-trust/extracted/pem, readOnly: true }

  # ---------------------------------------------------------------------------
  # Connectors — talks to Zeebe; no Vault-sourced runtime secret -> no sidecar.
  # ---------------------------------------------------------------------------
  connectors:
    enabled: true
    contextPath: "/connectors"
    inbound:
      mode: credentials
    extraVolumes:
      - name: trusted-ca
        configMap:
          name: trusted-ca
          optional: true
          items:
            - { key: service-ca.crt, path: tls-ca-bundle.pem }
    extraVolumeMounts:
      - { name: trusted-ca, mountPath: /etc/pki/ca-trust/extracted/pem, readOnly: true }

  # ---------------------------------------------------------------------------
  # Optimize — per-app SA + sidecar; ES password from its own secret.
  # Rendered workload: Deployment camunda-optimize.
  # ---------------------------------------------------------------------------
  optimize:
    enabled: true
    contextPath: "/optimize"
    serviceAccount:
      enabled: false
      name: camunda-vault-optimize
    database:
      elasticsearch:
        enabled: true
        url: { protocol: http, host: camunda-elasticsearch, port: 9200 }
        auth:
          username: elastic
          secret:
            existingSecret: camunda-optimize-secret
            existingSecretKey: elasticsearch-password
    initContainers:
      - name: vault-fetch
        image: icr.io/camunda-airgap/camunda-vault-agent:1.0.0
        imagePullPolicy: IfNotPresent
        args: ["fetch"]
        envFrom: [{ configMapRef: { name: camunda-vault-agent-env } }]
        env:
          - { name: POD_NAMESPACE, valueFrom: { fieldRef: { fieldPath: metadata.namespace } } }
        volumeMounts:
          - { name: vault-agent-config, mountPath: /etc/camunda-vault-agent, readOnly: true }
          - { name: vault-tmp, mountPath: /tmp }
          - { name: trusted-ca, mountPath: /etc/pki/ca-trust/extracted/pem, readOnly: true }
        securityContext: *agentSecCtx
    sidecars:
      - name: vault-agent
        image: icr.io/camunda-airgap/camunda-vault-agent:1.0.0
        imagePullPolicy: IfNotPresent
        args: ["watch"]
        envFrom: [{ configMapRef: { name: camunda-vault-agent-env } }]
        env:
          - { name: POD_NAMESPACE, valueFrom: { fieldRef: { fieldPath: metadata.namespace } } }
          - { name: RESTART_TARGET_KIND, value: Deployment }
          - { name: RESTART_TARGET_NAME, value: camunda-optimize }
        volumeMounts:
          - { name: vault-agent-config, mountPath: /etc/camunda-vault-agent, readOnly: true }
          - { name: vault-tmp, mountPath: /tmp }
          - { name: trusted-ca, mountPath: /etc/pki/ca-trust/extracted/pem, readOnly: true }
        resources:
          requests: { cpu: "10m", memory: "32Mi" }
          limits: { cpu: "100m", memory: "64Mi" }
        securityContext: *agentSecCtx
    extraVolumes:
      - { name: vault-agent-config, configMap: { name: camunda-vault-optimize-config } }
      - { name: vault-tmp, emptyDir: {} }
      - name: trusted-ca
        configMap:
          name: trusted-ca
          optional: true
          items:
            - { key: service-ca.crt, path: tls-ca-bundle.pem }
    extraVolumeMounts:
      - { name: trusted-ca, mountPath: /etc/pki/ca-trust/extracted/pem, readOnly: true }

  # ---------------------------------------------------------------------------
  # Web Modeler (+ dedicated PostgreSQL). The restapi consumes the DB password
  # at runtime -> per-app SA + sidecar that restarts only the restapi Deployment.
  # ---------------------------------------------------------------------------
  webModeler:
    enabled: true
    contextPath: "/modeler"
    serviceAccount:
      enabled: false
      name: camunda-vault-web-modeler
    restapi:
      mail:
        fromAddress: noreply@camunda.example.com
      initContainers:
        - name: vault-fetch
          image: icr.io/camunda-airgap/camunda-vault-agent:1.0.0
          imagePullPolicy: IfNotPresent
          args: ["fetch"]
          envFrom: [{ configMapRef: { name: camunda-vault-agent-env } }]
          env:
            - { name: POD_NAMESPACE, valueFrom: { fieldRef: { fieldPath: metadata.namespace } } }
          volumeMounts:
            - { name: vault-agent-config, mountPath: /etc/camunda-vault-agent, readOnly: true }
            - { name: vault-tmp, mountPath: /tmp }
            - { name: trusted-ca, mountPath: /etc/pki/ca-trust/extracted/pem, readOnly: true }
          securityContext: *agentSecCtx
      sidecars:
        - name: vault-agent
          image: icr.io/camunda-airgap/camunda-vault-agent:1.0.0
          imagePullPolicy: IfNotPresent
          args: ["watch"]
          envFrom: [{ configMapRef: { name: camunda-vault-agent-env } }]
          env:
            - { name: POD_NAMESPACE, valueFrom: { fieldRef: { fieldPath: metadata.namespace } } }
            - { name: RESTART_TARGET_KIND, value: Deployment }
            - { name: RESTART_TARGET_NAME, value: camunda-web-modeler-restapi }
          volumeMounts:
            - { name: vault-agent-config, mountPath: /etc/camunda-vault-agent, readOnly: true }
            - { name: vault-tmp, mountPath: /tmp }
            - { name: trusted-ca, mountPath: /etc/pki/ca-trust/extracted/pem, readOnly: true }
          resources:
            requests: { cpu: "10m", memory: "32Mi" }
            limits: { cpu: "100m", memory: "64Mi" }
          securityContext: *agentSecCtx
      extraVolumes:
        - { name: vault-agent-config, configMap: { name: camunda-vault-web-modeler-config } }
        - { name: vault-tmp, emptyDir: {} }
        - name: trusted-ca
          configMap:
            name: trusted-ca
            optional: true
            items:
              - { key: service-ca.crt, path: tls-ca-bundle.pem }
      extraVolumeMounts:
        - { name: trusted-ca, mountPath: /etc/pki/ca-trust/extracted/pem, readOnly: true }

  webModelerPostgresql:
    enabled: true
    auth:
      existingSecret: camunda-web-modeler-db-secret
      secretKeys:
        adminPasswordKey: admin-password
        userPasswordKey: user-password

  # ---------------------------------------------------------------------------
  # Console — no Vault-sourced runtime secret -> no sidecar.
  # ---------------------------------------------------------------------------
  console:
    enabled: true
    contextPath: "/console"
    extraVolumes:
      - name: trusted-ca
        configMap:
          name: trusted-ca
          optional: true
          items:
            - { key: service-ca.crt, path: tls-ca-bundle.pem }
    extraVolumeMounts:
      - { name: trusted-ca, mountPath: /etc/pki/ca-trust/extracted/pem, readOnly: true }

  # ---------------------------------------------------------------------------
  # Bundled Elasticsearch (single node) with X-Pack security. The `elastic`
  # password is seeded by the bootstrap Job into camunda-elasticsearch-secret.
  # ---------------------------------------------------------------------------
  elasticsearch:
    enabled: true
    security:
      enabled: true
      existingSecret: camunda-elasticsearch-secret
      tls:
        restEncryption: false
        autoGenerated: true
    master:
      masterOnly: false
      replicaCount: 1
    data:
      replicaCount: 0
    coordinating:
      replicaCount: 0
    ingest:
      replicaCount: 0
    sysctlImage:
      enabled: false
