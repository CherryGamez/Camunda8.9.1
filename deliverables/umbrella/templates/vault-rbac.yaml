{{- $va := .Values.vaultAgent -}}
{{/*
Per-app, least-privilege RBAC for the Vault agent.

  * Each sidecar-enabled app gets its OWN ServiceAccount + Role + RoleBinding.
    The Role allows: create Secrets (cannot be name-restricted), get/update/patch
    ONLY that app's Secret, and get/patch ONLY that app's own workload (for the
    rollout restart). Nothing else.
  * The bootstrap Job gets a separate ServiceAccount that may create + get/
    update/patch ONLY the named secrets it seeds. It performs no restarts.

All are pre-install/pre-upgrade hooks so they exist before the bootstrap Job
and persist for the lifetime of the release (module pods reference them by name).
*/}}
{{/* ----------------------- bootstrap ServiceAccount + RBAC ----------------------- */}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $va.bootstrap.serviceAccountName }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/part-of: camunda-platform
    app.kubernetes.io/component: vault-agent
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-20"
    helm.sh/hook-delete-policy: before-hook-creation
{{- if $va.rbac.create }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $va.bootstrap.serviceAccountName }}
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-15"
    helm.sh/hook-delete-policy: before-hook-creation
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames:
    {{- range $va.targets }}
      - {{ .secretName }}
    {{- end }}
    verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $va.bootstrap.serviceAccountName }}
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-14"
    helm.sh/hook-delete-policy: before-hook-creation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $va.bootstrap.serviceAccountName }}
subjects:
  - kind: ServiceAccount
    name: {{ $va.bootstrap.serviceAccountName }}
    namespace: {{ .Release.Namespace }}
{{- end }}
{{/* ----------------------- per-app ServiceAccounts + RBAC ----------------------- */}}
{{- range $va.targets }}
{{- if .sidecar }}
{{- $wlres := ternary "statefulsets" "deployments" (eq .sidecar.workload.kind "StatefulSet") }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .sidecar.serviceAccountName }}
  namespace: {{ $.Release.Namespace }}
  labels:
    app.kubernetes.io/part-of: camunda-platform
    app.kubernetes.io/component: vault-agent
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-20"
    helm.sh/hook-delete-policy: before-hook-creation
{{- if $va.rbac.create }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .sidecar.serviceAccountName }}
  namespace: {{ $.Release.Namespace }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-15"
    helm.sh/hook-delete-policy: before-hook-creation
rules:
  # Create the per-app secret the first time (create cannot be name-scoped).
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
  # Read / rotate ONLY this app's secret.
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["{{ .secretName }}"]
    verbs: ["get", "update", "patch"]
  # Rollout-restart ONLY this app's own workload.
  - apiGroups: ["apps"]
    resources: ["{{ $wlres }}"]
    resourceNames: ["{{ .sidecar.workload.name }}"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .sidecar.serviceAccountName }}
  namespace: {{ $.Release.Namespace }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-14"
    helm.sh/hook-delete-policy: before-hook-creation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .sidecar.serviceAccountName }}
subjects:
  - kind: ServiceAccount
    name: {{ .sidecar.serviceAccountName }}
    namespace: {{ $.Release.Namespace }}
{{- end }}
{{- end }}
{{- end }}
