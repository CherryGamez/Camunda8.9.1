# =============================================================================
# GitLab CI — render the Camunda umbrella chart to plain Kubernetes manifests
# for an ArgoCD "rendered manifests" GitOps flow (air-gapped friendly).
#
# Why render in CI instead of pointing ArgoCD at the Helm chart?
#   * Air-gap auditability: the exact YAML that hits the cluster is committed
#     and reviewable in Git.
#   * ArgoCD applies the committed manifests directly (Directory source), so it
#     does NOT need to run Helm itself. NOTE: a Helm post-renderer is NOT used
#     anywhere (the per-app rollout-restart design removed the need for
#     shareProcessNamespace), so the previous post-render step is gone.
#
# The transform converts Helm install hooks (helm.sh/hook*) into ArgoCD PreSync
# hooks + sync-waves, preserving the ordering: SA/RBAC/ConfigMaps/trusted-ca run
# before the Vault bootstrap Job, which runs before the datastores/apps.
#
# Replace the `image:` references and the GitOps push target with your internal
# (mirrored) registry/repo. All tools are pinned for reproducibility.
# =============================================================================
stages:
  - render
  - validate
  - publish

variables:
  RELEASE_NAME: "camunda"
  TARGET_NAMESPACE: "camunda"
  CHART_DIR: "umbrella"
  OUT_DIR: "rendered"
  OUT_FILE: "rendered/camunda.yaml"
  # GitOps repo that ArgoCD watches (Directory source). Override in CI settings.
  GITOPS_REPO: "git@gitlab.example.com:platform/camunda-gitops.git"
  GITOPS_BRANCH: "main"
  GITOPS_PATH: "camunda"

# Pin a builder image (mirror it into your air-gapped registry) that contains
# helm + yq (mikefarah v4) + kubeconform + git. Adjust to your mirror.
.tools:
  image: icr.io/camunda-airgap/ci-helm-tools:1.0.0

render:
  extends: .tools
  stage: render
  script:
    - mkdir -p "$OUT_DIR"
    # Air-gap: the camunda-platform dependency is vendored under charts/*.tgz,
    # so `helm dependency build` resolves offline (no repo add / network).
    - helm dependency build "$CHART_DIR"
    - |
      helm template "$RELEASE_NAME" "$CHART_DIR" \
        --namespace "$TARGET_NAMESPACE" \
        --include-crds > "$OUT_FILE"
    # Convert Helm install hooks -> ArgoCD PreSync hooks + sync-waves so the
    # SA/RBAC/ConfigMaps/trusted-ca and the bootstrap Job keep their ordering.
    - |
      yq -i '
        with(select(.metadata.annotations."helm.sh/hook" != null);
          .metadata.annotations."argocd.argoproj.io/hook" = "PreSync"
          | .metadata.annotations."argocd.argoproj.io/sync-wave" = (.metadata.annotations."helm.sh/hook-weight" // "0")
          | .metadata.annotations."argocd.argoproj.io/hook-delete-policy" = "BeforeHookCreation"
          | del(.metadata.annotations."helm.sh/hook")
          | del(.metadata.annotations."helm.sh/hook-weight")
          | del(.metadata.annotations."helm.sh/hook-delete-policy")
        )
      ' "$OUT_FILE"
  artifacts:
    paths:
      - "$OUT_FILE"
    expire_in: 1 week

validate:
  extends: .tools
  stage: validate
  needs: ["render"]
  script:
    # Schema-validate every rendered manifest. `--ignore-missing-schemas`
    # tolerates the bundled Camunda/Bitnami CRDs in air-gapped runners.
    - kubeconform -strict -summary -ignore-missing-schemas "$OUT_FILE"

publish:
  extends: .tools
  stage: publish
  needs: ["validate"]
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  script:
    - git config --global user.email "ci@example.com"
    - git config --global user.name  "GitLab CI"
    - git clone --branch "$GITOPS_BRANCH" "$GITOPS_REPO" gitops
    - mkdir -p "gitops/$GITOPS_PATH"
    - cp "$OUT_FILE" "gitops/$GITOPS_PATH/camunda.yaml"
    - cd gitops
    - git add "$GITOPS_PATH/camunda.yaml"
    - git commit -m "camunda: render ${CI_COMMIT_SHORT_SHA}" || echo "no changes"
    - git push origin "$GITOPS_BRANCH"
